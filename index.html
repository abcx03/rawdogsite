<!DOCTYPE html>
<html lang="en" data-theme="golden">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>$RAWDOG — Feed Raw. Live Strong.</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   $RAWDOG — pixel farm-sim styling
   ============================================================ */

/* ---- Theme variables (default: Golden Hour) ---- */
:root {
  --sky-top: #4a3a6b;
  --sky-mid: #b8452e;
  --sky-low: #e88a3c;
  --sky-horizon: #f4c84a;
  --sun: #ffe08a;
  --sun-core: #fff3c4;
  --mtn-far: #6a5a86;
  --mtn-near: #4a3e63;
  --tree-line: #2e3a2e;
  --grass-far: #7e8a3e;
  --grass-near: #5d7a34;
  --grass-tile: #6c8438;
  --road: #c9a26a;
  --road-dark: #a87f48;
  --road-line: #e6cf9a;
  --pond: #6a9ec0;
  --pond-dark: #4d7fa3;
  --cloud: #f3d9b0;
  --window-glow: transparent;
  --star-op: 0;

  /* UI woods + parchment (constant across themes) */
  --ink: #2a1d12;
  --ink-soft: #3e2c1b;
  --wood: #7a5230;
  --wood-light: #a06b38;
  --wood-dark: #4a3018;
  --parch: #f5e5d5;       /* exactly matches sprite bg */
  --parch-light: #fbf1e0;
  --parch-dark: #e7d2b6;
  --gold: #e8b43d;
  --gold-dark: #c8901f;
  --red: #c0392b;
  --green-ui: #6fa84a;
}

/* Meadow Day */
[data-theme="meadow"] {
  --sky-top: #6fb8e0;
  --sky-mid: #9ed6ee;
  --sky-low: #c8ecf6;
  --sky-horizon: #e4f5e0;
  --sun: #fff1a8;
  --sun-core: #fffce0;
  --mtn-far: #93a8c0;
  --mtn-near: #6f86a6;
  --tree-line: #355a3c;
  --grass-far: #8cbf52;
  --grass-near: #5fa040;
  --grass-tile: #74b048;
  --road: #d8b574;
  --road-dark: #b48f50;
  --road-line: #f0dca6;
  --pond: #6fb6d8;
  --pond-dark: #4e93bb;
  --cloud: #ffffff;
  --window-glow: transparent;
  --star-op: 0;
}

/* Starlit Night */
[data-theme="night"] {
  --sky-top: #141a32;
  --sky-mid: #23284a;
  --sky-low: #353a5e;
  --sky-horizon: #4a4a70;
  --sun: #e8edff;
  --sun-core: #ffffff;
  --mtn-far: #2a3358;
  --mtn-near: #1d2542;
  --tree-line: #16201c;
  --grass-far: #3a5238;
  --grass-near: #2c4230;
  --grass-tile: #344c34;
  --road: #8a7a5a;
  --road-dark: #6a5c40;
  --road-line: #b0a078;
  --pond: #34567a;
  --pond-dark: #243d58;
  --cloud: #3a4060;
  --window-glow: #ffd36b;
  --star-op: 1;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #1c150e;
  color: var(--ink);
  font-family: 'VT323', monospace;
  -webkit-font-smoothing: none;
  font-smooth: never;
  overflow-x: hidden;
}

img { image-rendering: pixelated; image-rendering: crisp-edges; }

.font-display { font-family: 'Press Start 2P', monospace; }

::selection { background: var(--gold); color: var(--ink); }

/* ---- Pixel panel (RPG dialog box: double border) ---- */
.panel {
  background: var(--parch);
  border: 4px solid var(--ink);
  box-shadow:
    inset 0 0 0 4px var(--parch),
    inset 0 0 0 8px var(--wood-dark),
    6px 6px 0 rgba(0,0,0,0.35);
  image-rendering: pixelated;
}

/* ---- Pixel bevel button ---- */
.btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  line-height: 1.4;
  color: var(--parch-light);
  background: var(--wood);
  border: 3px solid var(--ink);
  padding: 14px 20px;
  cursor: pointer;
  position: relative;
  box-shadow: inset 3px 3px 0 rgba(255,255,255,0.25), inset -4px -4px 0 rgba(0,0,0,0.35), 4px 4px 0 rgba(0,0,0,0.3);
  text-transform: uppercase;
  letter-spacing: 1px;
  user-select: none;
  transition: transform .05s steps(1);
}
.btn:hover { background: var(--wood-light); }
.btn:active { transform: translate(2px,2px); box-shadow: inset 3px 3px 0 rgba(0,0,0,0.3), 0 0 0 rgba(0,0,0,0); }

.btn-gold { background: var(--gold); color: var(--ink); }
.btn-gold:hover { background: #f3c659; }
.btn-green { background: var(--green-ui); color: #14210d; }
.btn-green:hover { background: #82bd5b; }
.btn-red { background: var(--red); }
.btn-red:hover { background: #d4503f; }
.btn-ghost { background: transparent; color: var(--ink); box-shadow: inset 0 0 0 3px var(--ink); border-color: transparent; }
.btn-sm { font-size: 9px; padding: 9px 12px; }

/* ============================================================
   TOP NAV
   ============================================================ */
.shell { min-height: 100vh; display: flex; flex-direction: column; }

.topbar {
  position: sticky; top: 0; z-index: 40;
  display: flex; align-items: center; gap: 18px;
  padding: 10px 18px;
  background: linear-gradient(#5a3a1f, #3a2412);
  border-bottom: 4px solid var(--ink);
  box-shadow: 0 4px 0 rgba(0,0,0,0.4);
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-head {
  width: 46px; height: 46px; object-fit: cover; object-position: top center;
  border: 3px solid var(--ink); background: var(--parch);
}
.brand-name { font-family:'Press Start 2P'; color: var(--gold); font-size: 20px; text-shadow: 3px 3px 0 #000; letter-spacing: 1px; }
.brand-name .x { color: var(--parch-light); }

.nav { display: flex; gap: 8px; margin-left: 8px; }
.nav-tab {
  font-family:'Press Start 2P'; font-size: 11px; color: var(--parch-dark);
  background: #4a2f18; border: 3px solid var(--ink); padding: 11px 14px;
  cursor: pointer; letter-spacing: 1px; text-transform: uppercase;
  box-shadow: inset -3px -3px 0 rgba(0,0,0,0.3);
}
.nav-tab:hover { color: var(--parch-light); background: #5e3d20; }
.nav-tab.active { color: var(--ink); background: var(--gold); box-shadow: inset 3px 3px 0 rgba(255,255,255,0.3); }

.topbar-spacer { flex: 1; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.x-link {
  width: 44px; height: 44px; display: grid; place-items: center;
  background: #14110c; border: 3px solid var(--ink); color: var(--parch-light);
  box-shadow: inset -3px -3px 0 rgba(0,0,0,0.4);
}
.x-link:hover { background: #261d12; }
.x-link svg { width: 20px; height: 20px; fill: currentColor; }

.ticker-pill {
  font-family:'VT323'; font-size: 18px; color: var(--gold);
  background: #14110c; border: 3px solid var(--ink); padding: 3px 10px; display: flex; gap: 7px; align-items:center; white-space:nowrap;
}
.ticker-pill .dot { width: 9px; height: 9px; background: var(--green-ui); box-shadow: 0 0 8px var(--green-ui); animation: blink 1.4s steps(2) infinite; }
@keyframes blink { 50% { opacity: .3; } }

/* ============================================================
   PAGE / CONTENT
   ============================================================ */
.page { flex: 1; }
.map-wrap { width: 100%; display: flex; justify-content: center; background: #0e0a06; padding: 0; }
.stage-scaler { width: 100%; overflow: hidden; }
.stage {
  position: relative; width: 1280px; height: 760px;
  transform-origin: top left;
  overflow: hidden;
  border-bottom: 4px solid var(--ink);
}

/* ---- Sky ---- */
.sky {
  position: absolute; inset: 0 0 38% 0;
  background: linear-gradient(var(--sky-top) 0%, var(--sky-mid) 48%, var(--sky-low) 80%, var(--sky-horizon) 100%);
}
.stars { position:absolute; inset:0 0 60% 0; opacity: var(--star-op); pointer-events:none; }
.star { position:absolute; width:3px; height:3px; background:#fff; box-shadow:0 0 4px #fff; animation: twinkle 2.5s steps(2) infinite; }
@keyframes twinkle { 50% { opacity:.25; } }

.sun {
  position: absolute; width: 92px; height: 92px; left: 50%; top: 16%; transform: translateX(-50%);
  background: radial-gradient(var(--sun-core) 0 38%, var(--sun) 39% 70%, transparent 72%);
  border-radius: 50%;
  image-rendering: auto;
  filter: drop-shadow(0 0 30px var(--sun));
}
[data-theme="golden"] .sun, :root .sun { top: 26%; }
[data-theme="meadow"] .sun { top: 12%; left: 74%; }
[data-theme="night"] .sun { top: 12%; left: 76%; width: 70px; height: 70px; filter: drop-shadow(0 0 18px #cdd6ff); }

.cloud { position: absolute; background: var(--cloud); opacity:.85; image-rendering: pixelated;
  box-shadow: 14px 0 0 var(--cloud), -14px 4px 0 var(--cloud), 28px 6px 0 var(--cloud), -28px 8px 0 var(--cloud); }
@keyframes drift { from { transform: translateX(-60px); } to { transform: translateX(120px); } }

.valley-headline { position:absolute; left:50%; top:7%; transform:translateX(-50%); z-index:4;
  width:min(720px,86%); text-align:center; font-family:'Press Start 2P'; font-size:17px; line-height:1.7;
  color:var(--parch-light); text-shadow: 3px 3px 0 var(--ink), -2px 0 0 var(--ink), 2px 0 0 var(--ink), 0 2px 0 var(--ink), 0 -2px 0 var(--ink); }
.valley-headline b { color:var(--gold); }
[data-theme="night"] .valley-headline { color:#eef1ff; }
@keyframes bob { 50% { transform: translateY(-5px); } }

/* ---- Mountains (stepped pixel silhouettes via clip-path) ---- */
.mtns { position: absolute; left: 0; right: 0; height: 150px; bottom: calc(62% - 70px); }
.mtn-layer { position:absolute; inset:0; }
.mtn-far { background: var(--mtn-far);
  clip-path: polygon(0 100%, 0 60%, 8% 40%, 16% 58%, 26% 28%, 36% 56%, 46% 34%, 56% 60%, 66% 30%, 76% 54%, 86% 36%, 94% 56%, 100% 44%, 100% 100%); opacity:.85; }
.mtn-near { background: var(--mtn-near);
  clip-path: polygon(0 100%, 0 78%, 12% 52%, 22% 74%, 34% 44%, 46% 72%, 58% 50%, 70% 76%, 82% 48%, 92% 70%, 100% 60%, 100% 100%); }

/* ---- Pine treeline ---- */
.treeline { position:absolute; left:0; right:0; bottom: 60%; height: 56px; display:flex; align-items:flex-end; overflow:hidden; }
.pine { width: 30px; height: 0; margin: 0 -6px;
  border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 46px solid var(--tree-line);
  filter: drop-shadow(0 -10px 0 var(--tree-line)); flex: none; }

/* ---- Farmland ---- */
.field {
  position: absolute; left:0; right:0; bottom:0; height: 62%;
  background:
    linear-gradient(var(--grass-far) 0%, var(--grass-near) 60%);
}
.field::before {
  content:""; position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
  background-size: 40px 28px, 40px 28px;
  opacity:.6;
}
.field::after { /* horizon haze */
  content:""; position:absolute; left:0; right:0; top:0; height:60px;
  background: linear-gradient(var(--grass-far), transparent);
}

/* winding road svg sits over field */
.road-svg { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

/* foreground grass tufts */
.fg-tufts { position:absolute; left:0; right:0; bottom:0; height:34px;
  background: repeating-linear-gradient(90deg, var(--grass-near) 0 10px, var(--grass-tile) 10px 20px);
  clip-path: polygon(0 40%,2% 10%,4% 40%,6% 5%,8% 40%,10% 12%,12% 40%,14% 6%,16% 40%,18% 10%,20% 40%,22% 5%,24% 40%,26% 12%,28% 40%,30% 6%,32% 40%,34% 10%,36% 40%,38% 5%,40% 40%,42% 12%,44% 40%,46% 6%,48% 40%,50% 10%,52% 40%,54% 5%,56% 40%,58% 12%,60% 40%,62% 6%,64% 40%,66% 10%,68% 40%,70% 5%,72% 40%,74% 12%,76% 40%,78% 6%,80% 40%,82% 10%,84% 40%,86% 5%,88% 40%,90% 12%,92% 40%,94% 6%,96% 40%,98% 10%,100% 40%,100% 100%,0 100%);
}

/* ============================================================
   DECORATIONS
   ============================================================ */
.deco { position:absolute; }
.tree { width: 54px; }
.tree .trunk { width: 12px; height: 22px; background:#6b4423; border:3px solid var(--ink); margin: 0 auto; }
.tree .crown { width: 54px; height: 46px; background: var(--tree-crown, #4a8a3a); border:3px solid var(--ink);
  box-shadow: inset -5px -5px 0 rgba(0,0,0,0.25), inset 5px 5px 0 rgba(255,255,255,0.18);
  clip-path: polygon(50% 0,72% 8%,90% 26%,100% 52%,88% 80%,64% 100%,36% 100%,12% 80%,0 52%,10% 26%,28% 8%);
}
.bush { width: 40px; height: 24px; background: var(--tree-crown,#4a8a3a); border:3px solid var(--ink);
  clip-path: polygon(20% 100%,8% 60%,24% 36%,42% 50%,56% 26%,76% 44%,92% 60%,84% 100%); }

.pond { background: var(--pond); border:3px solid var(--ink);
  box-shadow: inset -6px -6px 0 var(--pond-dark), inset 5px 5px 0 rgba(255,255,255,0.25);
  clip-path: polygon(18% 8%,52% 0,82% 12%,100% 42%,92% 74%,64% 100%,28% 96%,4% 66%,0 32%); }
.pond .shine { position:absolute; width:26%; height:10%; background:rgba(255,255,255,.5); top:22%; left:24%; }

.fence { display:flex; align-items:flex-end; height:30px; }
.fence .post { width:8px; height:30px; background:var(--wood-light); border:2px solid var(--ink); margin-right:22px; position:relative; }
.fence .post::after { content:""; position:absolute; top:6px; left:-22px; width:24px; height:6px; background:var(--wood); border:2px solid var(--ink); }

.crops { display:grid; grid-auto-flow:column; gap:7px; padding:6px 8px; background:#6b4a2a; border:3px solid var(--ink);
  box-shadow: inset 0 0 0 3px #7e5832; }
.crops .row { width:10px; height:38px; background: repeating-linear-gradient(var(--crop,#3f8f3a) 0 6px, #2f6f2c 6px 9px); border:2px solid #14110c; }

.hay { width:46px; height:34px; background: repeating-linear-gradient(#e2c46a 0 5px,#cda94e 5px 8px); border:3px solid var(--ink);
  box-shadow: inset -5px -5px 0 rgba(0,0,0,0.2); }
.hay::after{content:"";position:absolute;inset:8px 6px;border:2px dashed #9a7a30;opacity:.5;}

.flower { width:10px; height:10px; background:var(--fc,#e85d75); border:2px solid var(--ink); box-shadow:0 8px 0 -2px #3f8f3a; }

.signpost { display:flex; flex-direction:column; align-items:center; }
.signpost .board { font-family:'Press Start 2P'; font-size:9px; color:var(--parch-light); background:var(--wood); border:3px solid var(--ink); padding:6px 8px; text-align:center; box-shadow: inset -3px -3px 0 rgba(0,0,0,.3), inset 3px 3px 0 rgba(255,255,255,.2); }
.signpost .stick { width:8px; height:30px; background:var(--wood-dark); border:2px solid var(--ink); }

/* welcome billboard (mascot portrait) */
.billboard { position:absolute; width: 168px; filter: drop-shadow(5px 7px 0 rgba(0,0,0,0.32)); }
.bb-header { font-family:'Press Start 2P'; font-size:11px; color:var(--parch-light); background:var(--wood);
  border:4px solid var(--ink); border-bottom:none; padding:8px 6px; text-align:center; letter-spacing:1px;
  box-shadow: inset 3px 3px 0 rgba(255,255,255,.22); }
.bb-frame { position:relative; background:var(--parch); border:4px solid var(--ink); padding:5px;
  box-shadow: inset 0 0 0 3px var(--wood-dark); }
.bb-frame img { width:100%; display:block; image-rendering:pixelated; }
.bb-plate { font-family:'VT323'; font-size:15px; color:var(--parch-light); background:#14110c; border:2px solid var(--ink);
  text-align:center; padding:1px 4px; margin-top:5px; letter-spacing:.5px; }
.bb-posts { display:flex; justify-content:space-between; padding:0 22px; margin-top:-2px; }
.bb-posts span { width:11px; height:46px; background:var(--wood-dark); border:3px solid var(--ink); border-top:none;
  box-shadow: inset -3px 0 0 rgba(0,0,0,.3); }
.mascot-base { position:absolute; bottom:-6px; left:50%; transform:translateX(-50%); width:130px; height:16px; background:rgba(0,0,0,.26); border-radius:50%; filter:blur(2px); }

/* ============================================================
   STALL
   ============================================================ */
.stall { position:absolute; transform: translate(-50%,-100%); cursor:pointer; --awn:#e8b43d; --awn2:#caa72e; }
.stall-inner { position:relative; transition: transform .08s steps(2); }
.stall:hover .stall-inner { transform: translateY(-7px); }
.stall:hover .stall-name { background: var(--gold); color: var(--ink); }
.stall:hover .clickcue { opacity:1; transform: translate(-50%,0); }

.awning { position:relative; width:128px; height:34px; margin:0 auto;
  background: repeating-linear-gradient(90deg, var(--awn) 0 16px, var(--parch-light) 16px 32px);
  border:3px solid var(--ink); border-bottom:none;
  box-shadow: inset 0 4px 0 rgba(255,255,255,.25);
}
.awning .scallop { position:absolute; left:-3px; right:-3px; bottom:-12px; height:12px;
  background: repeating-linear-gradient(90deg, var(--awn) 0 16px, var(--parch-light) 16px 32px);
  clip-path: polygon(0 0,100% 0,100% 0,94% 100%,88% 0,81% 100%,75% 0,69% 100%,63% 0,56% 100%,50% 0,44% 100%,38% 0,31% 100%,25% 0,19% 100%,13% 0,6% 100%,0 0);
  border-left:3px solid var(--ink); border-right:3px solid var(--ink);
}
.posts { position:relative; width:128px; height:78px; margin:0 auto; display:flex; justify-content:space-between; }
.post-l, .post-r { width:9px; height:78px; background:var(--wood); border:3px solid var(--ink); box-shadow: inset -3px 0 0 rgba(0,0,0,.3); }
.counter { position:absolute; left:-4px; right:-4px; bottom:0; height:30px; background:var(--wood-light); border:3px solid var(--ink);
  box-shadow: inset 0 4px 0 rgba(255,255,255,.25), inset 0 -6px 0 rgba(0,0,0,.25); }
.counter::after{content:"";position:absolute;left:6px;right:6px;top:9px;height:4px;background:var(--wood-dark);}

/* product display board */
.product-board { position:absolute; left:50%; top:6px; transform:translateX(-50%); width:74px; height:62px;
  background: var(--parch); border:3px solid var(--ink); display:grid; place-items:center; overflow:hidden;
  box-shadow: inset 0 0 0 2px var(--parch); }
.product-board img { width:108%; height:108%; object-fit:contain; }
[data-theme="night"] .product-board { box-shadow: inset 0 0 0 2px var(--parch), 0 0 14px var(--window-glow); }

.stall-name { font-family:'Press Start 2P'; font-size:8px; color:var(--ink); background:var(--parch-light);
  border:3px solid var(--ink); padding:6px 7px; text-align:center; white-space:nowrap; margin:8px auto 0; width:max-content;
  box-shadow:3px 3px 0 rgba(0,0,0,.3); }
.stall-price { font-family:'VT323'; font-size:17px; color:var(--gold); background:#14110c; border:2px solid var(--ink);
  padding:1px 7px; width:max-content; margin:4px auto 0; }
.stall-price b { color:var(--parch-light); }

.clickcue { position:absolute; top:-26px; left:50%; transform:translate(-50%,6px); opacity:0; transition:.12s steps(2);
  font-family:'Press Start 2P'; font-size:8px; color:var(--ink); background:var(--gold); border:2px solid var(--ink); padding:4px 6px; white-space:nowrap; }
.clickcue::after{content:"";position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--ink);}

.stall-base { position:absolute; bottom:-10px; left:50%; transform:translateX(-50%); width:120px; height:14px; background:rgba(0,0,0,.26); border-radius:50%; filter:blur(2px); }

/* hint banner under map */
.map-foot { display:flex; align-items:center; justify-content:center; gap:14px; flex-wrap:wrap; padding:14px;
  background: linear-gradient(#3a2412,#2a1a0d); color:var(--parch-dark); font-size:19px; }
.map-foot b { color: var(--gold); }
.map-foot .coin { display:inline-block; width:16px; height:16px; background:var(--gold); border:2px solid var(--ink); border-radius:50%; vertical-align:-3px; }

/* ============================================================
   MODALS
   ============================================================ */
.overlay { position:fixed; inset:0; z-index:60; background:rgba(10,7,4,.72); display:grid; place-items:center; padding:20px;
  animation: fade .15s steps(2); }
@keyframes fade { from { opacity:0; } }
.modal { width:min(520px,94vw); max-height:92vh; overflow:auto; position:relative; padding:22px; animation: pop .16s steps(3); }
@keyframes pop { from { transform: translateY(14px) scale(.96); } }
.modal-x { position:absolute; top:10px; right:10px; width:34px; height:34px; display:grid; place-items:center;
  background:var(--red); color:#fff; border:3px solid var(--ink); font-family:'Press Start 2P'; font-size:11px; cursor:pointer;
  box-shadow: inset -3px -3px 0 rgba(0,0,0,.35); }
.modal-x:hover{ background:#d4503f; }

.modal h2 { font-family:'Press Start 2P'; font-size:16px; color:var(--ink-soft); margin-bottom:4px; line-height:1.5; }
.modal .sub { font-size:19px; color:var(--wood); margin-bottom:14px; }

.product-hero { display:flex; gap:16px; align-items:center; margin-bottom:14px; }
.product-hero .pic { width:120px; height:120px; flex:none; background:var(--parch); border:4px solid var(--ink); display:grid; place-items:center; overflow:hidden; box-shadow:inset 0 0 0 3px var(--parch-dark); }
.product-hero .pic img { width:112%; height:112%; object-fit:contain; }
.product-hero .meta { flex:1; min-width:150px; }
.farm-photo { flex:none; width:120px; margin:0; }
.farm-photo img { display:block; width:120px; height:96px; object-fit:cover; border:3px solid var(--ink);

// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

          <Tree x={92} y={60} s={1} crown="#4a8a3a" />

          <Pond x={78} y={90} w={140} h={64} />

          <Crops x={66} y={88} rows={6} color="#4a9a40" />

          <Hay x={84} y={70} />

          <Bush x={56} y={84} crown="#4a8a3a" />

window.RAWDOG_SCENE = { MapScene, ProductArt, EggSprite };

</script>
<script type="text/babel" data-from="modals.jsx">
/* global React, window */
const { useState } = React;

function Modal({ children, onClose, wide }) {
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal panel" style={wide ? { width: 'min(560px,94vw)' } : null} onClick={(e) => e.stopPropagation()}>
        <button className="modal-x" onClick={onClose} aria-label="close">✕</button>
        {children}
      </div>
    </div>
  );
}

function CopyField({ value, className }) {
  const [copied, setCopied] = useState(false);
  function copy() {
    navigator.clipboard?.writeText(value).catch(() => {});
    setCopied(true);
    setTimeout(() => setCopied(false), 1400);
  }
  return (
    <div className="addr-row">
      <div className={className || 'addr'}>{value}</div>
      <button className="btn btn-gold btn-sm copy-btn" onClick={copy}>{copied ? 'COPIED!' : 'COPY'}</button>
    </div>
  );
}

// ---------- Product card ----------
function ProductModal({ farm, onClose, onOrder }) {
  const { ProductArt } = window.RAWDOG_SCENE;
  const fmt = window.RAWDOG_DATA.fmt;
  const [qty, setQty] = useState(1);
  const total = farm.price * qty;
  return (
    <Modal onClose={onClose} wide>
      <h2>{farm.farm}</h2>
      <div className="sub">{farm.location}</div>
      <div className="product-hero">
        <div className="pic"><ProductArt farm={farm} big /></div>
        <div className="meta">
          <span className="tag">{farm.tag}</span>
          <div className="product-desc">{farm.desc}</div>
        </div>
        {farm.photo && (
          <figure className="farm-photo">
            <img src={farm.photo} alt={farm.location} />
            <figcaption>{farm.location}</figcaption>
          </figure>
        )}
      </div>
      <div className="price-row">
        <div>
          <div className="lbl">{farm.product}</div>
          <div style={{ fontFamily: 'VT323', fontSize: 19, color: 'var(--wood)' }}>per {farm.unit}</div>
        </div>
        <div className="amt"><b>{fmt(farm.price)}</b> $RAWDOG</div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
        <div className="lbl" style={{ fontFamily: 'Press Start 2P', fontSize: 9, color: 'var(--wood)' }}>QUANTITY</div>
        <div className="stepper">
          <button onClick={() => setQty((q) => Math.max(1, q - 1))}>−</button>
          <div className="qty">{qty}</div>
          <button onClick={() => setQty((q) => Math.min(99, q + 1))}>+</button>
        </div>
      </div>
      <div className="total-row">
        <div className="lbl">TOTAL</div>
        <div className="val">{fmt(total)} $RAWDOG</div>
      </div>
      <div className="btn-row">
        <button className="btn btn-ghost" onClick={onClose}>BACK</button>
        <button className="btn btn-green" onClick={() => onOrder(farm, qty)}>ORDER NOW ▸</button>
      </div>
    </Modal>
  );
}

// ---------- Order / deposit flow ----------
function OrderModal({ farm, qty: initialQty, onClose }) {
  const { DEPOSIT_WALLET, ProductArt, fmt } = { ...window.RAWDOG_DATA, ...window.RAWDOG_SCENE };
  const [step, setStep] = useState(1);
  const [qty, setQty] = useState(initialQty);
  const [form, setForm] = useState({ email: '', wallet: '', name: '', address: '', fulfillment: 'ship', notes: '' });
  const [errs, setErrs] = useState({});
  const total = farm.price * qty;
  const orderId = 'RD-' + Math.random().toString(36).slice(2, 7).toUpperCase();

  function set(k, v) { setForm((f) => ({ ...f, [k]: v })); }

  function validate() {
    const e = {};
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Enter a valid email';
    if (form.wallet.trim().length < 25) e.wallet = 'Paste the wallet you sent from';
    if (!form.name.trim()) e.name = 'Required';
    if (form.fulfillment === 'ship' && form.address.trim().length < 6) e.address = 'Enter a delivery address';
    setErrs(e);
    return Object.keys(e).length === 0;
  }

  return (
    <Modal onClose={onClose} wide>
      <h2>{step < 3 ? 'Place Your Order' : 'Order Received'}</h2>
      <div className="sub">{farm.product} · {farm.farm}</div>
      <div className="steps">
        <div className={'s ' + (step >= 1 ? 'on' : '')} />
        <div className={'s ' + (step >= 2 ? 'on' : '')} />
        <div className={'s ' + (step >= 3 ? 'on' : '')} />
      </div>

      {step === 1 && (
        <div>
          <div className="deposit">
            <span className="lbl">STEP 1 — SEND PAYMENT</span>
            <div style={{ fontFamily: 'VT323', fontSize: 22, marginBottom: 10, color: 'var(--ink-soft)' }}>
              Send exactly <b style={{ color: 'var(--gold-dark)' }}>{fmt(total)} $RAWDOG</b> to the farm wallet below:
            </div>
            <CopyField value={DEPOSIT_WALLET} />
            <div className="warn">⚠ <b>Placeholder address</b> — the live deposit wallet drops at launch. Don't send real funds yet.</div>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
            <div className="lbl" style={{ fontFamily: 'Press Start 2P', fontSize: 9, color: 'var(--wood)' }}>QUANTITY</div>
            <div className="stepper">
              <button onClick={() => setQty((q) => Math.max(1, q - 1))}>−</button>
              <div className="qty">{qty}</div>
              <button onClick={() => setQty((q) => Math.min(99, q + 1))}>+</button>
            </div>
          </div>
          <div className="btn-row">
            <button className="btn btn-ghost" onClick={onClose}>CANCEL</button>
            <button className="btn btn-green" onClick={() => setStep(2)}>I'VE SENT IT ▸</button>
          </div>
        </div>
      )}

      {step === 2 && (
        <div>
          <p style={{ fontFamily: 'VT323', fontSize: 21, color: 'var(--wood)', marginBottom: 14 }}>
            Step 2 — tell us where to send your goods and which wallet you paid from, so we can match your deposit.
          </p>
          <div className="field-group">
            <label>EMAIL <span className="req">*</span></label>
            <input className={'input' + (errs.email ? ' bad' : '')} type="email" placeholder="you@example.com"
              value={form.email} onChange={(e) => set('email', e.target.value)} />
            {errs.email && <div className="err">{errs.email}</div>}
          </div>
          <div className="field-group">
            <label>WALLET YOU SENT FROM <span className="req">*</span></label>
            <input className={'input' + (errs.wallet ? ' bad' : '')} placeholder="Your Solana address"
              value={form.wallet} onChange={(e) => set('wallet', e.target.value)} />
            {errs.wallet && <div className="err">{errs.wallet}</div>}
          </div>
          <div className="two-col">
            <div className="field-group">
              <label>FULL NAME <span className="req">*</span></label>
              <input className={'input' + (errs.name ? ' bad' : '')} placeholder="Raw Dogger"
                value={form.name} onChange={(e) => set('name', e.target.value)} />
              {errs.name && <div className="err">{errs.name}</div>}
            </div>
            <div className="field-group">
              <label>FULFILLMENT</label>
              <select className="input" value={form.fulfillment} onChange={(e) => set('fulfillment', e.target.value)}>
                <option value="ship">Ship to me</option>
                <option value="pickup">Local farm pickup</option>
              </select>
            </div>
          </div>
          {form.fulfillment === 'ship' && (
            <div className="field-group">
              <label>DELIVERY ADDRESS <span className="req">*</span></label>
              <textarea className={'textarea' + (errs.address ? ' bad' : '')} placeholder="Street, city, state, zip"
                value={form.address} onChange={(e) => set('address', e.target.value)} />
              {errs.address && <div className="err">{errs.address}</div>}
            </div>
          )}
          <div className="field-group">
            <label>NOTES <span style={{ color: 'var(--wood)' }}>(optional)</span></label>
            <textarea className="textarea" placeholder="Allergies, delivery window, hello from the pack…"
              value={form.notes} onChange={(e) => set('notes', e.target.value)} />
          </div>
          <div className="summary">
            <div className="line"><span>{farm.product} × {qty}</span><span>{fmt(total)} $RAWDOG</span></div>
            <div className="line tot"><span>TOTAL</span><b>{fmt(total)}</b></div>
          </div>
          <div className="btn-row">
            <button className="btn btn-ghost" onClick={() => setStep(1)}>◂ BACK</button>
            <button className="btn btn-green" onClick={() => validate() && setStep(3)}>SUBMIT ORDER</button>
          </div>
        </div>
      )}

      {step === 3 && (
        <div className="confirm">
          <div className="coinpop">🪙</div>
          <div className="big">YOU'RE IN THE PACK!</div>
          <p style={{ fontFamily: 'VT323', fontSize: 21, color: 'var(--ink-soft)', lineHeight: 1.3, maxWidth: 380, margin: '0 auto' }}>
            We'll verify your <b>{fmt(total)} $RAWDOG</b> deposit on-chain and email <b>{form.email}</b> once
            {form.fulfillment === 'ship' ? ' your ' : ' your pickup for '} {qty}× {farm.product} from {farm.farm} is confirmed.
          </p>
          <div className="order-id">ORDER {orderId}</div>
          <div className="summary" style={{ textAlign: 'left', marginTop: 14 }}>
            <div className="line"><span>Item</span><span>{farm.product} × {qty}</span></div>
            <div className="line"><span>Farm</span><span>{farm.farm}</span></div>
            <div className="line"><span>Paid from</span><span style={{ fontSize: 15 }}>{form.wallet.slice(0, 10)}…</span></div>
            <div className="line tot"><span>TOTAL</span><b>{fmt(total)}</b></div>
          </div>
          <button className="btn btn-gold" style={{ marginTop: 16, width: '100%' }} onClick={onClose}>BACK TO THE VALLEY</button>
        </div>
      )}
    </Modal>
  );
}

window.RAWDOG_MODALS = { ProductModal, OrderModal, Modal, CopyField };

</script>
<script type="text/babel" data-from="tabs.jsx">

          <span className="bar">{Array.from({ length: 8 }).map((_, i) => <i key={i} className={i < 8 ? 'on-h' : ''} />)}</span></div>

</script>
<script type="text/babel" data-from="app.jsx">
/* global React, ReactDOM, window */
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "golden",
  "ticker": "$RAWDOG"
}/*EDITMODE-END*/;

function XIcon() {
  return (
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.9 2H22l-7.6 8.7L23 22h-6.8l-5-6.5L5.4 22H2.3l8-9.3L1.6 2h6.9l4.5 6 5.9-6Zm-1.2 18h1.9L7.2 4H5.2l12.5 16Z" /></svg>
  );
}

function TopBar({ tab, setTab, ticker }) {
  const { X_URL } = window.RAWDOG_DATA;
  const tabs = [['map', 'FARM MAP'], ['gallery', 'MEME VAULT'], ['buy', 'HOW TO BUY']];
  return (
    <header className="topbar">
      <div className="brand">
        <img className="brand-head" src="assets/sprites/doghead.png" alt="" />
        <div className="brand-name">RAW<span className="x">DOG</span></div>
      </div>
      <nav className="nav">
        {tabs.map(([id, label]) => (
          <button key={id} className={'nav-tab' + (tab === id ? ' active' : '')} onClick={() => setTab(id)}>{label}</button>
        ))}
      </nav>
      <div className="topbar-spacer" />
      <div className="topbar-right">
        <div className="ticker-pill"><span className="dot" />{ticker}</div>
        <a className="x-link" href={X_URL} target="_blank" rel="noreferrer" aria-label="X / Twitter"><XIcon /></a>
        <button className="btn btn-gold btn-sm" onClick={() => setTab('buy')} style={{ whiteSpace: 'nowrap' }}>BUY ▸</button>
      </div>
    </header>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [tab, setTab] = useState('map');
  const [productFarm, setProductFarm] = useState(null);   // ProductModal
  const [order, setOrder] = useState(null);               // {farm, qty} OrderModal

  const { MapScene } = window.RAWDOG_SCENE;
  const { GalleryTab, HowToBuyTab } = window.RAWDOG_TABS;
  const { ProductModal, OrderModal } = window.RAWDOG_MODALS;

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', t.theme || 'golden');
  }, [t.theme]);

  return (
    <div className="shell">
      <TopBar tab={tab} setTab={setTab} ticker={t.ticker} />

      <main className="page">
        {tab === 'map' && (
          <>
            <MapScene onOpen={(f) => setProductFarm(f)} />
            <div className="map-foot">
              <span><span className="coin" /> Walk the valley — <b>click any stall</b> to trade <b>$RAWDOG</b> for real organic goods from local farms.</span>
            </div>
          </>
        )}
        {tab === 'gallery' && <GalleryTab />}
        {tab === 'buy' && <HowToBuyTab />}
      </main>

      {productFarm && (
        <ProductModal
          farm={productFarm}
          onClose={() => setProductFarm(null)}
          onOrder={(farm, qty) => { setProductFarm(null); setOrder({ farm, qty }); }}
        />
      )}
      {order && (
        <OrderModal farm={order.farm} qty={order.qty} onClose={() => setOrder(null)} />
      )}

      <TweaksPanel>
        <TweakSection label="World" />
        <TweakRadio label="Time of day" value={t.theme}
          options={[{ value: 'golden', label: 'Golden' }, { value: 'meadow', label: 'Day' }, { value: 'night', label: 'Night' }]}
          onChange={(v) => setTweak('theme', v)} />
        <TweakSection label="Brand" />
        <TweakText label="Ticker" value={t.ticker} onChange={(v) => setTweak('ticker', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
